name: CI

# Run on every push to main and on every PR that targets main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel a previous run on the same branch if a newer commit arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: TypeScript type-check + client/shared unit tests ──────────────
  client-tests:
    name: Client & Shared Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: Run client & shared tests
        run: npm run test

  # ── Job 2: Server unit tests (uses MongoDB Memory Server — no real DB) ───
  server-tests:
    name: Server Tests
    runs-on: ubuntu-latest

    # Make the binary cache path available to every step in this job.
    # /home/runner is always the home directory on GitHub-hosted Ubuntu runners.
    env:
      MONGOMS_BIN: /home/runner/.cache/mongodb-binaries

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      # Cache the MongoDB binary that mongodb-memory-server downloads.
      - name: Cache MongoDB binary
        uses: actions/cache@v4
        with:
          path: ${{ env.MONGOMS_BIN }}
          key: ${{ runner.os }}-mongoms-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-mongoms-

      - name: Install dependencies
        run: npm ci

      - name: Run server tests
        run: npm run test:server
        env:
          MONGOMS_DOWNLOAD_DIR: ${{ env.MONGOMS_BIN }}
          NODE_ENV: test
          # Dummy secrets — only used by JWT helpers in test scope.
          # Real secrets live in GitHub → Settings → Secrets and never here.
          JWT_SECRET: ci-test-jwt-secret
          JWT_REFRESH_SECRET: ci-test-jwt-refresh-secret
